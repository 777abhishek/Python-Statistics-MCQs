<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Statistics — Exam Blitz 🎯</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3e;
    --accent:#7c3aed;--accent2:#06b6d4;--green:#10b981;--red:#ef4444;
    --yellow:#f59e0b;--text:#e2e8f0;--muted:#6b7280;
    --correct:rgba(16,185,129,0.15);--wrong:rgba(239,68,68,0.15);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
  header{background:linear-gradient(135deg,#0a0a0f 0%,#1a0a2e 50%,#0a0a0f 100%);border-bottom:1px solid var(--border);padding:2rem 1.5rem 1.5rem;text-align:center;position:relative;overflow:hidden}
  header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(124,58,237,0.3),transparent);pointer-events:none}
  .header-badge{display:inline-block;background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.5);color:#a78bfa;font-family:'Space Mono',monospace;font-size:0.7rem;padding:.3rem .8rem;border-radius:999px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:1rem}
  h1{font-size:clamp(1.8rem,5vw,3rem);font-weight:800;letter-spacing:-.02em;line-height:1.1}
  h1 span{color:#a78bfa}
  .subtitle{color:var(--muted);font-family:'Space Mono',monospace;font-size:.75rem;margin-top:.6rem;letter-spacing:.05em}
  .scoreboard{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;padding:1rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
  .score-pill{display:flex;align-items:center;gap:.5rem;background:var(--card);border:1px solid var(--border);padding:.4rem 1rem;border-radius:999px;font-family:'Space Mono',monospace;font-size:.75rem}
  .dot{width:8px;height:8px;border-radius:50%}
  .dot-g{background:var(--green)}.dot-r{background:var(--red)}.dot-y{background:var(--yellow)}.dot-p{background:var(--accent)}.dot-c{background:var(--accent2)}
  #score-val{color:var(--green);font-weight:700}#wrong-val{color:var(--red);font-weight:700}#skip-val{color:var(--yellow);font-weight:700}#prog-val{color:var(--accent2);font-weight:700}#pct-val{color:#a78bfa;font-weight:700}
  .pb-wrap{width:100%;max-width:600px;height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin:0 auto}
  .pb-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s ease;width:0%}
  main{max-width:880px;margin:0 auto;padding:2rem 1.2rem 5rem}
  .topic-section{margin-bottom:3.5rem}
  .topic-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:2px solid var(--border)}
  .topic-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
  .topic-header h2{font-size:1.05rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
  .topic-count{margin-left:auto;font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted)}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.4rem 1.5rem;margin-bottom:1rem;transition:border-color .2s;position:relative}
  .q-card:hover{border-color:rgba(124,58,237,0.4)}
  .q-card.answered-correct{border-color:var(--green);background:var(--correct)}
  .q-card.answered-wrong{border-color:var(--red);background:var(--wrong)}
  .q-num{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
  .diff-badge{padding:.1rem .5rem;border-radius:4px;font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  .diff-hard{background:rgba(239,68,68,0.2);color:#fca5a5}
  .diff-medium{background:rgba(245,158,11,0.2);color:#fcd34d}
  .diff-tricky{background:rgba(139,92,246,0.2);color:#c4b5fd}
  .q-text{font-size:.93rem;font-weight:600;line-height:1.55;margin-bottom:1rem;color:#f0f0ff}
  .q-code{background:#0d0d17;border:1px solid #2a2a3e;border-left:3px solid var(--accent);border-radius:8px;padding:.8rem 1rem;font-family:'Space Mono',monospace;font-size:.73rem;color:#a5f3fc;margin:.6rem 0 1rem;white-space:pre;overflow-x:auto;line-height:1.6}
  .options{display:flex;flex-direction:column;gap:.5rem}
  .opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.7rem 1rem;color:var(--text);font-family:'Syne',sans-serif;font-size:.84rem;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:flex-start;gap:.7rem}
  .opt-btn:hover:not(:disabled){border-color:rgba(124,58,237,0.6);background:rgba(124,58,237,0.1);transform:translateX(3px)}
  .opt-key{font-family:'Space Mono',monospace;font-size:.65rem;font-weight:700;min-width:22px;height:22px;border-radius:5px;background:var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .opt-btn.correct-ans{background:rgba(16,185,129,0.2);border-color:var(--green);color:#a7f3d0}
  .opt-btn.wrong-ans{background:rgba(239,68,68,0.15);border-color:var(--red);color:#fca5a5}
  .opt-btn:disabled{cursor:default}
  .explanation{margin-top:.8rem;padding:.7rem 1rem;background:rgba(6,182,212,0.08);border-left:3px solid var(--accent2);border-radius:0 8px 8px 0;font-size:.79rem;color:#a5f3fc;line-height:1.6;display:none}
  .explanation.show{display:block}
  #result-screen{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:999;align-items:center;justify-content:center;padding:1rem}
  #result-screen.show{display:flex}
  .result-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;max-width:500px;width:100%;text-align:center}
  .result-emoji{font-size:4rem;margin-bottom:1rem}
  .result-title{font-size:1.8rem;font-weight:800;margin-bottom:.5rem}
  .result-score{font-family:'Space Mono',monospace;font-size:3rem;font-weight:700;color:var(--accent);margin:1rem 0}
  .result-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;margin:1.5rem 0}
  .result-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.8rem}
  .result-stat-val{font-size:1.4rem;font-weight:800}
  .result-stat-label{font-size:.68rem;color:var(--muted);margin-top:.2rem}
  .restart-btn{background:linear-gradient(135deg,var(--accent),#6d28d9);border:none;color:white;padding:.9rem 2rem;border-radius:10px;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;width:100%;margin-top:.5rem;letter-spacing:.05em;transition:opacity .2s}
  .restart-btn:hover{opacity:.85}
  .submit-wrap{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:200}
  .submit-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:white;padding:.9rem 2.5rem;border-radius:999px;font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;box-shadow:0 8px 30px rgba(124,58,237,0.4);letter-spacing:.05em;transition:transform .15s,box-shadow .15s}
  .submit-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(124,58,237,0.5)}
  ic{background:#1a1a2e;padding:2px 6px;border-radius:4px;font-family:'Space Mono',monospace;font-size:.8em;color:#a5f3fc}
  @media(max-width:540px){.q-code{font-size:.66rem}.q-text{font-size:.86rem}.result-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header>
  <div class="header-badge">GCF Python Statistics · Certificate Exam</div>
  <h1>Exam <span>Blitz</span> 🎯</h1>
  <p class="subtitle" id="total-label">160 MCQs · Hard / Medium / Tricky · All Topics Covered</p>
</header>

<div class="scoreboard">
  <div class="score-pill"><span class="dot dot-g"></span>Correct: <strong id="score-val">0</strong></div>
  <div class="score-pill"><span class="dot dot-r"></span>Wrong: <strong id="wrong-val">0</strong></div>
  <div class="score-pill"><span class="dot dot-y"></span>Left: <strong id="skip-val">0</strong></div>
  <div class="score-pill"><span class="dot dot-p"></span>Done: <strong id="prog-val">0/0</strong></div>
  <div class="score-pill"><span class="dot dot-c"></span>Score: <strong id="pct-val">0%</strong></div>
  <div style="width:100%;max-width:620px;margin:0 auto"><div class="pb-wrap"><div class="pb-fill" id="progress-bar"></div></div></div>
</div>

<main id="quiz-main"></main>

<div class="submit-wrap">
  <button class="submit-btn" onclick="submitQuiz()">Submit & See Results 🚀</button>
</div>

<div id="result-screen">
  <div class="result-box">
    <div class="result-emoji" id="res-emoji">🎓</div>
    <div class="result-title" id="res-title">Results</div>
    <div class="result-score" id="res-score">0/0</div>
    <div class="result-grid">
      <div class="result-stat"><div class="result-stat-val" id="res-correct" style="color:var(--green)">0</div><div class="result-stat-label">Correct</div></div>
      <div class="result-stat"><div class="result-stat-val" id="res-wrong" style="color:var(--red)">0</div><div class="result-stat-label">Wrong</div></div>
      <div class="result-stat"><div class="result-stat-val" id="res-skip" style="color:var(--yellow)">0</div><div class="result-stat-label">Skipped</div></div>
      <div class="result-stat"><div class="result-stat-val" id="res-pct" style="color:var(--accent)">0%</div><div class="result-stat-label">Score</div></div>
    </div>
    <div id="res-message" style="color:var(--muted);font-size:.85rem;margin-bottom:1rem;line-height:1.5"></div>
    <button class="restart-btn" onclick="restartQuiz()">Try Again 🔁</button>
  </div>
</div>

<script>
const T = [
  // ══════════════════════════════════════════════════════════
  // 1. NUMPY & STATISTICS MODULE
  // ══════════════════════════════════════════════════════════
  { topic:"NumPy & Statistics Module", icon:"📐", color:"#7c3aed", questions:[
    { q:"What does <ic>np.std(data, ddof=1)</ic> calculate?", code:null, opts:["Population standard deviation","Sample standard deviation","Variance","Mean absolute deviation"], ans:1, diff:"medium", exp:"ddof=1 applies Bessel's correction → sample std. ddof=0 (default) = population std." },
    { q:"What is the output?", code:`import numpy as np
marks = np.array([65,70,75,80,85,90])
print(np.mean(marks))`, opts:["75.5","77.5","75.0","80.0"], ans:1, diff:"medium", exp:"Mean = (65+70+75+80+85+90)/6 = 465/6 = 77.5" },
    { q:"Which function returns a 2×2 correlation matrix for two arrays?", code:null, opts:["np.correlation()","np.corrcoef()","np.pearson()","np.cov()"], ans:1, diff:"medium", exp:"np.corrcoef(x,y) returns a 2×2 matrix where [0][1] and [1][0] are the Pearson r values." },
    { q:"What does <ic>np.percentile(data, 75)</ic> return?", code:null, opts:["75th value in sorted list","Third quartile Q3","75% of max value","The median"], ans:1, diff:"medium", exp:"np.percentile(data,75) = Q3, the value below which 75% of data falls." },
    { q:"What is the default ddof value in <ic>np.std()</ic>?", code:null, opts:["1","0","2","-1"], ans:1, diff:"tricky", exp:"np.std() uses ddof=0 by default (population std). Use ddof=1 for sample std." },
    { q:"For data [10,12,15,18,20,22,25], what is <ic>np.max(data) - np.min(data)</ic>?", code:null, opts:["13","15","17","12"], ans:1, diff:"medium", exp:"Range = 25 - 10 = 15" },
    { q:"What does <ic>np.median([3,1,4,1,5,9,2,6])</ic> return?", code:null, opts:["3.0","3.5","4.0","2.5"], ans:1, diff:"hard", exp:"Sorted: [1,1,2,3,4,5,6,9]. n=8 (even). Median = (3+4)/2 = 3.5" },
    { q:"Which scipy function is used for computing skewness?", code:null, opts:["scipy.stats.kurtosis()","scipy.stats.skew()","scipy.stats.norm()","scipy.stats.skewness()"], ans:1, diff:"medium", exp:"from scipy.stats import skew — skew(data) returns the skewness coefficient." },
    { q:"What does <ic>np.random.seed(42)</ic> do?", code:null, opts:["Generates exactly 42 values","Sets starting point for reproducible random numbers","Limits array size to 42","Shuffles array 42 times"], ans:1, diff:"medium", exp:"Setting a seed ensures the random number sequence is reproducible across runs." },
    { q:"What is the output of <ic>np.var([2,4,6,8,10])</ic>?", code:null, opts:["8.0","10.0","6.0","5.0"], ans:0, diff:"hard", exp:"Mean=6. Deviations²: 16,4,0,4,16 → sum=40 / 5 = 8.0 (population variance, ddof=0)." }
  ]},

  // ══════════════════════════════════════════════════════════
  // 2. PANDAS
  // ══════════════════════════════════════════════════════════
  { topic:"Pandas — DataFrames & Analysis", icon:"🐼", color:"#06b6d4", questions:[
    { q:"Which method gives count, mean, std, min, quartiles, max in one call?", code:null, opts:["df.info()","df.summary()","df.describe()","df.stats()"], ans:2, diff:"medium", exp:"df.describe() returns full summary statistics. df.info() shows dtypes and null counts." },
    { q:"What does <ic>df['Marks'].value_counts(normalize=True)</ic> return?", code:null, opts:["Raw frequency","Relative frequency (0 to 1)","Cumulative frequency","Percentage out of 100"], ans:1, diff:"tricky", exp:"normalize=True returns proportions (relative frequency). Multiply by 100 for percentages." },
    { q:"What does <ic>pd.cut()</ic> do?", code:null, opts:["Removes rows","Splits continuous variable into bins/categories","Slices strings","Sorts DataFrame"], ans:1, diff:"medium", exp:"pd.cut() discretizes continuous data into bins — used for grade categories, class intervals." },
    { q:"What is the output?", code:`import pandas as pd
data = {"Marks":[65,70,75,80,85]}
df = pd.DataFrame(data)
print(df["Marks"].var())`, opts:["62.5","50.0","75.0","56.25"], ans:0, diff:"hard", exp:"Pandas .var() uses ddof=1 by default. Mean=75, deviations²: 100,25,0,25,100 → sum=250/4 = 62.5" },
    { q:"What does <ic>df.groupby('Gender').sample(2)</ic> perform?", code:null, opts:["2 random rows from whole df","Drops groups < 2 rows","Stratified sampling: 2 from each group","Filters rows appearing twice"], ans:2, diff:"hard", exp:"groupby + sample = stratified sampling — takes n rows from each group independently." },
    { q:"What does <ic>df.dtypes</ic> return?", code:null, opts:["Data values","Column names only","Data type of each column","Number of rows"], ans:2, diff:"medium", exp:"df.dtypes returns the data type (int64, float64, object, etc.) for every column." },
    { q:"Which pandas method creates a frequency table from a categorical column?", code:null, opts:["df.freq()","df['col'].value_counts()","df.frequency()","df['col'].count()"], ans:1, diff:"medium", exp:"value_counts() returns count of each unique value — the base of a frequency table." },
    { q:"What does <ic>pd.DataFrame(data)</ic> require as input?", code:null, opts:["Only a list","Only a NumPy array","A dict, list of lists, or 2D array","A CSV file path"], ans:2, diff:"medium", exp:"pd.DataFrame() accepts dicts (column→values), list of lists, NumPy arrays, and more." },
    { q:"What is the purpose of <ic>df['col'].mode()</ic>?", code:null, opts:["Returns the mean","Returns the most frequent value(s)","Calculates standard deviation","Returns the median"], ans:1, diff:"medium", exp:"mode() returns the most frequently occurring value(s). Returns a Series (there may be multiple modes)." },
    { q:"In the course, pandas was imported as:", code:`import pandas as a`, opts:["pd","pa","a","pan"], ans:2, diff:"tricky", exp:"Non-standard — the course used 'a' as alias for pandas. Standard convention is 'pd'." },
    { q:"What does <ic>df['Marks'].describe()</ic> show for quartiles?", code:null, opts:["Only Q2","Q1 (25%), Q2 (50%), Q3 (75%)","Q1 and Q3 only","All 4 quartiles"], ans:1, diff:"medium", exp:"describe() includes 25% (Q1), 50% (Q2/median), 75% (Q3) as percentile statistics." },
    { q:"Which Pandas function is used to read a CSV file?", code:null, opts:["pd.load_csv()","pd.read_csv()","pd.open_csv()","pd.import_csv()"], ans:1, diff:"medium", exp:"pd.read_csv('filename.csv') loads a CSV file into a DataFrame." }
  ]},

  // ══════════════════════════════════════════════════════════
  // 3. CENTRAL TENDENCY
  // ══════════════════════════════════════════════════════════
  { topic:"Measures of Central Tendency", icon:"📊", color:"#10b981", questions:[
    { q:"The Weighted Mean formula is:", code:null, opts:["Σ(x)/n","Σ(w·x) / Σ(w)","Σ(x·n) / Σ(n)","Σ(w) / Σ(x)"], ans:1, diff:"medium", exp:"Weighted mean = sum of (weight × value) ÷ sum of all weights." },
    { q:"Combined mean of Group1 (n=5, mean=75) and Group2 (n=6, mean=80.5) is:", code:null, opts:["77.75","78.05","77.5","78.18"], ans:3, diff:"hard", exp:"Combined mean = (5×75 + 6×80.5) / (5+6) = (375+483)/11 = 858/11 ≈ 78.18" },
    { q:"In a normal distribution, which is TRUE?", code:null, opts:["Mean > Median > Mode","Mean = Median = Mode","Mode > Mean > Median","Median > Mode > Mean"], ans:1, diff:"medium", exp:"Perfect normal distribution: Mean = Median = Mode, all at the center." },
    { q:"Karl Pearson's skewness coefficient using Mode is:", code:null, opts:["(Median-Mean)/Std","3(Mean-Median)/Std","(Mean-Mode)/Std","(Mode-Mean)/Variance"], ans:2, diff:"hard", exp:"Pearson's mode-based sk = (Mean - Mode) / Std. The median-based = 3(Mean-Median)/Std." },
    { q:"Which measure of central tendency is most affected by outliers?", code:null, opts:["Mode","Median","Mean","All equally affected"], ans:2, diff:"medium", exp:"Mean uses all values arithmetically, so extreme outliers pull it strongly. Median and mode are resistant." },
    { q:"For data [3,3,5,7,7,7,9], the mode is:", code:null, opts:["5","7","3","Both 3 and 7"], ans:1, diff:"medium", exp:"Mode = most frequent value. 7 appears 3 times, 3 appears 2 times → Mode = 7." },
    { q:"Median of [4,8,15,16,23,42] is:", code:null, opts:["15","15.5","16","14"], ans:1, diff:"medium", exp:"n=6 (even). Median = (15+16)/2 = 15.5. Middle two values are 4th and 3rd in sorted order." },
    { q:"Which central tendency measure is used with nominal/categorical data?", code:null, opts:["Mean","Median","Mode","Weighted mean"], ans:2, diff:"medium", exp:"Mode is the only meaningful central tendency for categorical (nominal) data like blood groups, colors." },
    { q:"What is the geometric mean of [4, 9]?", code:null, opts:["6.0","6.5","6.25","5.0"], ans:0, diff:"hard", exp:"Geometric mean = √(4×9) = √36 = 6.0. Used for growth rates and ratios." },
    { q:"Combined mean formula requires:", code:null, opts:["Only group means","Group sizes (n₁,n₂) and group means","Group std deviations","Variance of each group"], ans:1, diff:"medium", exp:"Combined mean = (n₁×mean₁ + n₂×mean₂)/(n₁+n₂). You need both group sizes and means." }
  ]},

  // ══════════════════════════════════════════════════════════
  // 4. MEASURES OF DISPERSION
  // ══════════════════════════════════════════════════════════
  { topic:"Measures of Dispersion", icon:"📏", color:"#f59e0b", questions:[
    { q:"Which measure is LEAST affected by extreme values?", code:null, opts:["Range","Standard Deviation","IQR","Variance"], ans:2, diff:"medium", exp:"IQR = Q3-Q1 uses only the middle 50% of data, immune to outliers." },
    { q:"Coefficient of Variation (CV) formula is:", code:null, opts:["(Mean/Std)×100","(Std/Mean)×100","(Variance/Mean)×100","(Range/Mean)×100"], ans:1, diff:"medium", exp:"CV = (Std/Mean)×100. Measures relative variability; allows comparison across different units." },
    { q:"What does ddof=1 mean in <ic>np.var(data, ddof=1)</ic>?", code:null, opts:["Divide by n+1","Divide by n-1 (sample variance)","Divide by n","Ignore first point"], ans:1, diff:"tricky", exp:"ddof=Degrees of Freedom. ddof=1 → divide by (n-1) = unbiased sample variance (Bessel's correction)." },
    { q:"Dataset A: mean=50, std=5. Dataset B: mean=200, std=15. Which is MORE consistent?", code:null, opts:["A (CV=10%)","B (CV=7.5%)","Same consistency","Cannot determine"], ans:1, diff:"hard", exp:"CV_A=5/50×100=10%, CV_B=15/200×100=7.5%. Lower CV = more consistent. B is more consistent." },
    { q:"Range is defined as:", code:null, opts:["Q3-Q1","Max-Min","(Max+Min)/2","Std × 2"], ans:1, diff:"medium", exp:"Range = Maximum value - Minimum value. Simplest but least robust measure of dispersion." },
    { q:"What is the sample variance of [2, 4, 6, 8, 10]?", code:null, opts:["8.0","10.0","6.67","7.5"], ans:1, diff:"hard", exp:"Mean=6. Deviations²: 16,4,0,4,16 → sum=40. Sample variance = 40/(5-1) = 10.0 (ddof=1)." },
    { q:"IQR is calculated as:", code:null, opts:["Q1-Q3","Q3-Q1","(Q1+Q3)/2","Q2-Q1"], ans:1, diff:"medium", exp:"IQR = Q3 - Q1 = 75th percentile minus 25th percentile." },
    { q:"Standard Deviation is the _____ of Variance:", code:null, opts:["Square","Reciprocal","Square root","Double"], ans:2, diff:"medium", exp:"SD = √Variance. SD is in the same units as the data; variance is in squared units." },
    { q:"What does a high Coefficient of Variation indicate?", code:null, opts:["Very consistent dataset","Normally distributed data","High variability relative to mean","Low standard deviation"], ans:2, diff:"medium", exp:"High CV = high relative variability. The spread is large compared to the mean." },
    { q:"Which <ic>np.percentile</ic> call gives Q1?", code:null, opts:["np.percentile(data,50)","np.percentile(data,25)","np.percentile(data,75)","np.percentile(data,100)"], ans:1, diff:"medium", exp:"Q1 = 25th percentile. Q2 = 50th (median). Q3 = 75th percentile." }
  ]},

  // ══════════════════════════════════════════════════════════
  // 5. SKEWNESS & KURTOSIS
  // ══════════════════════════════════════════════════════════

// ─── STATE ───
let state = {}, answered = 0, correct = 0, wrong = 0, allQs = [];

function buildQuiz() {
  const main = document.getElementById('quiz-main');
  main.innerHTML = '';
  let gIdx = 0;
  allQs = [];
  state = {}; answered = 0; correct = 0; wrong = 0;

  T.forEach(topic => {
    const sec = document.createElement('div');
    sec.className = 'topic-section';
    sec.innerHTML = `<div class="topic-header">
      <div class="topic-icon" style="background:${topic.color}22;border:1px solid ${topic.color}44;color:${topic.color}">${topic.icon}</div>
      <h2 style="color:${topic.color}">${topic.topic}</h2>
      <div class="topic-count">${topic.questions.length} Qs</div>
    </div>`;

    topic.questions.forEach(q => {
      gIdx++;
      const qId = 'q'+gIdx;
      allQs.push({ qId, ans: q.ans });
      state[qId] = null;

      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = qId;

      const codeBlock = q.code ? `<div class="q-code">${q.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : '';
      const qText = (q.q||'').replace(/<ic>(.*?)<\/ic>/g,'<ic>$1</ic>');
      const optsHtml = q.opts.map((o,i) => `
        <button class="opt-btn" id="${qId}_o${i}" onclick="pick('${qId}',${i},${q.ans},'${encodeURIComponent(q.exp)}')">
          <span class="opt-key">${String.fromCharCode(65+i)}</span><span>${o}</span>
        </button>`).join('');

      card.innerHTML = `
        <div class="q-num">Q${gIdx} &nbsp;<span class="diff-badge diff-${q.diff}">${q.diff}</span></div>
        <div class="q-text">${qText}</div>${codeBlock}
        <div class="options">${optsHtml}</div>
        <div class="explanation" id="${qId}_exp"></div>`;
      sec.appendChild(card);
    });
    main.appendChild(sec);
  });

  const total = allQs.length;
  document.getElementById('total-label').textContent = `${total} MCQs · Hard / Medium / Tricky · All Topics Covered`;
  updateHUD();
}

function pick(qId, chosen, correctIdx, expEnc) {
  if (state[qId] !== null) return;
  state[qId] = chosen;
  const card = document.getElementById(qId);
  card.querySelectorAll('.opt-btn').forEach((b,i) => {
    b.disabled = true;
    if (i === correctIdx) b.classList.add('correct-ans');
    if (i === chosen && chosen !== correctIdx) b.classList.add('wrong-ans');
  });
  const exp = document.getElementById(qId+'_exp');
  exp.textContent = decodeURIComponent(expEnc);
  exp.classList.add('show');
  if (chosen === correctIdx) { card.classList.add('answered-correct'); correct++; }
  else { card.classList.add('answered-wrong'); wrong++; }
  answered++;
  updateHUD();
}

function updateHUD() {
  const total = allQs.length;
  const pct = answered > 0 ? Math.round((correct/answered)*100) : 0;
  document.getElementById('score-val').textContent = correct;
  document.getElementById('wrong-val').textContent = wrong;
  document.getElementById('skip-val').textContent = total - answered;
  document.getElementById('prog-val').textContent = `${answered}/${total}`;
  document.getElementById('pct-val').textContent = answered > 0 ? pct+'%' : '0%';
  document.getElementById('progress-bar').style.width = `${(answered/total)*100}%`;
}

function submitQuiz() {
  const total = allQs.length;
  const skipped = total - answered;
  const pct = Math.round((correct/total)*100);
  document.getElementById('res-score').textContent = `${correct}/${total}`;
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-skip').textContent = skipped;
  document.getElementById('res-pct').textContent = pct+'%';
  let emoji, title, msg;
  if (pct>=90){emoji='🏆';title='Outstanding!';msg='You are fully exam-ready. Exceptional performance across all topics!';}
  else if (pct>=75){emoji='🎯';title='Great Job!';msg='Strong result! Review the questions you got wrong before the exam.';}
  else if (pct>=55){emoji='📚';title='Good Effort!';msg='Decent base, but revise weak topics — especially those you skipped.';}
  else if (pct>=35){emoji='💪';title='Keep Pushing!';msg='Need more revision. Focus on core concepts and re-attempt the quiz.';}
  else{emoji='😤';title='Start Over!';msg='Go back to your notes, revise each topic, then crush this quiz!';}
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-message').textContent = `${pct}% — ${msg}`;
  document.getElementById('result-screen').classList.add('show');
}

function restartQuiz() {
  document.getElementById('result-screen').classList.remove('show');
  buildQuiz();
  window.scrollTo({top:0,behavior:'smooth'});
}

buildQuiz();
